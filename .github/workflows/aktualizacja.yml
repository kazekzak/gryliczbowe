name: Aktualizacja EuroJackpot CSV

on:
  schedule:
    - cron: '45 17 * * 2,5'
    - cron: '45 18 * * 2,5'
  workflow_dispatch:

jobs:
  aktualizuj:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pobierz eurojackpot.csv
        run: |
          curl -L --fail --retry 3 \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
            -H "Accept: text/csv,*/*" \
            -o eurojackpot_nowy.csv \
            "https://www.wynikilotto.net.pl/download/eurojackpot.csv"
          echo "Pobrano $(wc -l < eurojackpot_nowy.csv) wierszy"

      - name: Walidacja pobranego pliku
        run: |
          if ! head -1 eurojackpot_nowy.csv | grep -q "^0001,"; then
            echo "BLAD: plik nie zaczyna sie od danych CSV - przerywam"
            head -5 eurojackpot_nowy.csv
            exit 1
          fi
          if [ $(wc -l < eurojackpot_nowy.csv) -lt 900 ]; then
            echo "BLAD: plik podejrzanie krotki - przerywam"
            exit 1
          fi
          echo "Walidacja OK"

      - name: Porownaj i wgraj jesli nowe dane
        run: |
          if diff -q eurojackpot.csv eurojackpot_nowy.csv > /dev/null 2>&1; then
            echo "Brak nowych danych - pomijam"
          else
            mv eurojackpot_nowy.csv eurojackpot.csv
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add eurojackpot.csv
            git commit -m "Aktualizacja wynikow EuroJackpot $(date +%Y-%m-%d)"
            git push
            echo "Zaktualizowano!"
          fi
